databases:
  - name: finance-postgres
    databaseName: financedb
    user: financeuser
    plan: free

services:
  - type: web
    name: finance-backend
    env: node
    rootDir: finance-backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_DAYS
        value: 30
      - key: BCRYPT_ROUNDS
        value: 12
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: finance-postgres
          property: connectionString
